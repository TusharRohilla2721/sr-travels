<!DOCTYPE html>
<html lang="en" data-theme="warm">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="SR Travels — Affordable & Reliable Travel across NCR and All India. Employee transport, tourist buses, honeymoon packages and more." />
  <meta name="theme-color" content="#c4622d" />

  <!-- Preconnect to origins we'll use -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://res.cloudinary.com" crossorigin />

  <!--
    OPTIMIZATION: Add &display=swap so text is immediately visible with system
    font while Cormorant/DM Sans load — eliminates render-blocking flash.
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet" />

  <!--
    OPTIMIZATION: Preload the hero image so the browser fetches it at the
    highest priority before React renders — directly improves LCP.
    Update this URL if the hero image ever changes.
  -->
  <link rel="preload" as="image"
    href="https://res.cloudinary.com/dzadpggxn/image/upload/q_auto,f_auto,w_1200/v1774172216/WhatsApp_Image_2026-03-06_at_12.21.52_AM_ixi0oh.jpg"
    fetchpriority="high" />

  <title>SR Travels — Affordable & Reliable Travel</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
